<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns:dc="http://purl.org/dc/elements/1.1/"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns="http://www.w3.org/2000/svg"
   viewBox="0 0 512 768"
   height="768"
   width="512"
   version="1.1"
   id="selah-logo-svg">
  <defs
     id="defs-selah">
    <style id="style-selah-colors">
      .charcoal { fill: #36454F; }
      .muted-gold { fill: #C5A059; }
      .bg-parchment { fill: #FDFCF5; }
      .text-primary { font-family: 'Roboto', 'Helvetica Neue', sans-serif; font-weight: 500; fill: #36454F; }
      .text-secondary { font-family: 'Heiti SC', 'PingFang SC', sans-serif; font-weight: 400; fill: #36454F; }
    </style>
    
    <radialGradient
       id="core-gradient"
       cx="256"
       cy="256"
       fx="256"
       fy="256"
       r="110"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0%"
         style="stop-color:#F7E3B5;stop-opacity:1" />
      <stop
         offset="100%"
         style="stop-color:#C5A059;stop-opacity:1" />
    </radialGradient>
    
    <mask
       id="controlled-gateway-mask">
      <rect
         width="100%"
         height="100%"
         fill="white"
         id="mask-background" />
      <circle
         cx="400"
         cy="400"
         r="60"
         fill="black"
         id="mask-gap" />
    </mask>
  </defs>
  
  <rdf:RDF>
    <cc:Work
       rdf:about="">
      <dc:format>image/svg+xml</dc:format>
      <dc:type
         rdf:resource="http://purl.org/dc/dcmitype/StillImage" />
      <dc:title>Selah · 细拉 Open Source Personal Assistant Agent Logo</dc:title>
    </cc:Work>
  </rdf:RDF>

  <rect
     width="100%"
     height="100%"
     class="bg-parchment"
     id="background-rect" />

  <g
     transform="translate(0, 0)"
     id="symbol-group">
    
    <rect
       x="106"
       y="106"
       width="300"
       height="300"
       rx="50"
       ry="50"
       stroke-width="20"
       class="charcoal"
       stroke="#36454F"
       fill="none"
       mask="url(#controlled-gateway-mask)"
       id="inner-room-boundary" />

    <circle
       cx="256"
       cy="256"
       r="90"
       fill="url(#core-gradient)"
       id="agent-soul-core" />
  </g>
  
  <g
     transform="translate(256, 512)"
     id="text-group">
    <text
       x="0"
       y="100"
       text-anchor="middle"
       font-size="64"
       class="text-primary"
       id="english-name">SELAH</text>
    
    <text
       x="0"
       y="180"
       text-anchor="middle"
       font-size="48"
       class="text-secondary"
       id="chinese-name">细拉</text>
  </g>
</svg>